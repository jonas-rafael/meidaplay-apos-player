name: iOS Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Project
      run: ./gradlew clean assemble -x :composeApp:compileCommonMainKotlinMetadata -x :composeApp:compileIosMainKotlinMetadata

    - name: Upload iOS Framework Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ComposeAppFramework
        path: composeApp/build/bin/iosArm64/releaseFramework/
